# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- django_5_upgrade

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  tagDate: $[ format('{0:yyyy}.{0:MM}.{0:dd}.{0:HH}.{0:mm}{0:ss}', pipeline.startTime) ]
  isMain: $[eq(variables['Build.SourceBranch'], 'refs/heads/django_5_upgrade')]
  imageName: 'ghcr.io/dbca-wa/ledger'
  devImageName: 'ghcr.io/dbca-wa/docker_app_dev'

stages:
- stage: Build
  condition: and(succeeded(), eq(variables.isMain, 'true'))
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    # 1. Extract the short SHA
    - script: |
        SHORT_SHA=$(git rev-parse --short=7 $(Build.SourceVersion))
        echo "##vso[task.setvariable variable=shortSha]$SHORT_SHA"
      displayName: 'Generate Short Git SHA'
    # 2. Authenticate to GHCR natively before running commands
    - task: Docker@2
      displayName: 'Login to GHCR'
      inputs:
        command: login
        containerRegistry: DockerGitHub
    # 3. FIXED: Build Main Image using native Bash to force arguments parsing
    - bash: |
        export DOCKER_BUILDKIT=1
        docker build \
          --build-arg IMAGE_TAG="$(tagDate)-$(shortSha)" \
          --build-arg IMAGE_NAME="$(imageName)" \
          -t $(imageName):latest \
          -t $(imageName):$(tagDate)-$(shortSha) \
          -f $(Build.SourcesDirectory)/Dockerfile .
      displayName: 'Docker Build Main Image'     

    # 4. Push Main Image tags
    - bash: |
        docker push $(imageName):latest
        docker push $(imageName):$(tagDate)-$(shortSha)
      displayName: 'Push Main Image'

    # 5. FIXED: Build Dev Image using native Bash
    - bash: |
        export DOCKER_BUILDKIT=1
        docker build \
          --build-arg IMAGE_TAG="$(tagDate)-$(shortSha)" \
          --build-arg IMAGE_NAME="$(devImageName)" \
          -t $(devImageName):ledger_dev_django5_latest \
          -t $(devImageName):ledger_dev_django5_$(tagDate)-$(shortSha) \
          -f $(Build.SourcesDirectory)/dockerdev/Dockerfile .
      displayName: 'Docker Build Dev Image'

    # 6. Push Dev Image tags
    - bash: |
        docker push $(devImageName):ledger_dev_django5_latest
        docker push $(devImageName):ledger_dev_django5_$(tagDate)-$(shortSha)
      displayName: 'Push Dev Image'
              
